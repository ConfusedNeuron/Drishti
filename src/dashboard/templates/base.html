<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Dashboard{% endblock %} — Drishti</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
  <link rel="stylesheet" href="/static/css/theme.css">
  <link rel="stylesheet" href="/static/css/layout.css">
  <link rel="stylesheet" href="/static/css/components.css">
  <link rel="stylesheet" href="/static/css/tooltip.css">
  {% block extra_head %}{% endblock %}
</head>
<body>

<header>
  <div>
    <a href="/" style="text-decoration:none;color:inherit"><h1>Drishti</h1></a>
    <p>Portfolio Risk Analytics · Bloomberg FRTL · IIM Calcutta PGDBA FRM</p>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <a href="/learn" class="header-link">Learn</a>
    <div id="regime-badge"></div>
    <div style="position:relative">
      <button id="theme-btn" onclick="toggleThemePicker(event)" title="Change theme" aria-label="Change theme">⬡ Theme</button>
      <div id="theme-popover" style="display:none;position:absolute;top:38px;right:0;background:var(--surface);border:1px solid var(--line-2);border-radius:12px;padding:14px;width:220px;box-shadow:0 16px 48px rgba(0,0,0,0.6);z-index:100">
        <div class="tp-section-label">Theme</div>
        <div id="tp-presets"></div>
        <div class="tp-section-label" style="margin-top:10px">Accent</div>
        <div id="tp-accents"></div>
      </div>
    </div>
  </div>
</header>

{% block nav %}{% endblock %}

<div class="page">
  {% block content %}{% endblock %}
</div>

<script src="/static/js/theme.js"></script>
<script src="/static/js/api.js"></script>
<script src="/static/js/charts.js"></script>
{% block scripts %}{% endblock %}
<script src="/static/js/tooltip.js"></script>
</body>
</html>

name: Weekly data refresh + test + deploy

on:
  schedule:
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh synthetic cache
        run: PYTHONPATH=. python scripts/generate_synthetic_cache.py

      - name: Pull public data gap-fill
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: PYTHONPATH=. python scripts/pull_public_data.py

      - name: Commit public cache updates
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cache/public/ || true
          git diff --cached --quiet || git commit -m "chore: weekly public cache refresh [skip ci]"
          git push

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

      - name: Deploy to Render
        if: success()
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
               -H "Content-Type: application/json" \
               --fail
